name: Deploy Backend to EC2 (staging)

on:
  push:
    branches: [staging]
  # Permite re-desplegar la previa a mano desde Actions → "Run workflow".
  workflow_dispatch:

# Ambiente previo: corre un 2º contenedor en el mismo EC2 (puerto 8082),
# apuntando a la base `tepidolacuenta_dev` y con credenciales de test de
# MercadoPago. No toca el contenedor de producción (puerto 8081, :latest).
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag separado para no pisar la imagen de producción (:latest).
          tags: ${{ secrets.DOCKER_USERNAME }}/tepidolacuenta-backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/apps/backend-staging || mkdir -p ~/apps/backend-staging && cd ~/apps/backend-staging
            docker pull ${{ secrets.DOCKER_USERNAME }}/tepidolacuenta-backend:staging
            docker stop tepidolacuenta-backend-staging || true
            docker rm tepidolacuenta-backend-staging || true
            docker run -d \
              --name tepidolacuenta-backend-staging \
              -p 8082:8080 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e MONGODB_DATABASE="tepidolacuenta_dev" \
              -e FRONTEND_BASE_URL="${{ secrets.STAGING_FRONTEND_BASE_URL }}" \
              -e CORS_ALLOWED_ORIGINS="${{ secrets.STAGING_CORS_ALLOWED_ORIGINS }}" \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              -e SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
              -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              -e SMTP_FROM="${{ secrets.SMTP_FROM }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e GOOGLE_REDIRECT_URL="${{ secrets.STAGING_GOOGLE_REDIRECT_URL }}" \
              -e SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
              -e SENTRY_ENVIRONMENT="staging" \
              -e MERCADOPAGO_ACCESS_TOKEN="${{ secrets.STAGING_MERCADOPAGO_ACCESS_TOKEN }}" \
              -e MERCADOPAGO_NOTIFICATION_URL="${{ secrets.STAGING_MERCADOPAGO_NOTIFICATION_URL }}" \
              -e MERCADOPAGO_WEBHOOK_SECRET="${{ secrets.STAGING_MERCADOPAGO_WEBHOOK_SECRET }}" \
              -e GIN_MODE="release" \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/tepidolacuenta-backend:staging

            echo "✅ Staging deployment successful"
